# Prefix stays at Ctrl+b (default, no change needed)

# Intuitive splits (| and - instead of % and ")
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows inherit current path
bind c new-window -c "#{pane_current_path}"

# Cursor key pane navigation (with prefix)
#bind Up    select-pane -U
#bind Down  select-pane -D
#bind Left  select-pane -L
#bind Right select-pane -R

# Or without prefix using Alt+arrow (pick one style, not both)
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R

# Mouse support
set -g mouse on

# Vi keys in copy mode
setw -g mode-keys vi

# Bigger scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Claude Code passthrough for notifications
set -g allow-passthrough on

# Reduce escape delay
set -sg escape-time 10

# True color support
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:RGB"
